<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA - Controle de Equipamentos</title>
    <link rel="stylesheet" href="css/user.css">
    <link rel="icon" href="img/GPA2.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 550px; position: relative; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .status { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: capitalize; }
        .status.operando { background: #e3fcef; color: #155724; }
        .status.quebrado { background: #ffe3e3; color: #721c24; }
        .status.parado { background: #fef4e5; color: #856404; }
        
        .propriedade-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; background: #eee; }
        .btn-excluir { background: #dc3545; color: white; margin-top: 10px; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-excluir:hover { background: #a71d2a; }
    </style>
</head>
<body>
    <div class="container-principal">
        <aside class="menu-lateral">
            <div class="menu-header">
                <img src="img/GPA.png" alt="Logo GPA" class="logo-menu">
                <button class="minimizar-menu"><i class="fas fa-bars"></i></button>
            </div>
            <nav class="menu-items">
                <a href="index.html" class="menu-item"><i class="fas fa-home menu-icon"></i><span class="menu-text">Início</span></a>
                <a href="dashboard.html" class="menu-item"><i class="fas fa-history menu-icon"></i><span class="menu-text">Histórico</span></a>
                <a href="Usuario.html" class="menu-item"><i class="fas fa-users menu-icon"></i><span class="menu-text">Usuários</span></a>
                <a href="coletores.html" class="menu-item" style="background-color: #fff; color: #02253B;"><i class="fas fa-barcode menu-icon"></i><span class="menu-text">Coletores</span></a>
                <a href="dashboard_equipamentos.html" class="menu-item"><i class="fas fa-chart-bar menu-icon"></i><span class="menu-text">Dashboard</span></a>
            </nav>
        </aside>

        <main class="conteudo-principal">
            <header class="conteudo-header">
                <h1 class="header-title">Controle de Equipamentos</h1> 
            </header>

            <div class="table-controls">
                <button onclick="abrirModalCadastro()" class="cadastrar-usuario-btn"><i class="fas fa-plus"></i> Adicionar Coletor</button>
                <div class="search-container">
                    <input type="text" id="inputBusca" placeholder="Pesquisar..." onkeyup="filtrarTabela()">
                </div>
            </div>
            
            <div class="teste">
                <table>
                    <thead>
                        <tr>
                            <th>Identificador CD</th>
                            <th>Condição</th>
                            <th>Tipo</th>
                            <th>Propriedade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable1"></tbody> 
                </table>
            </div>

            <div id="modalCadastro" class="modal">
                <div class="modal-content">
                    <span class="close" onclick="fecharModalCadastro()">&times;</span>
                    <h2 id="modalTitulo">Cadastrar Equipamento</h2>
                    <form id="formCadastro">
                        <input type="hidden" id="editId">
                        
                        <div class="form-group">
                            <label>Identificador CD*</label>
                            <input type="text" id="identificador" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Tipo de Equipamento*</label>
                            <select id="tipo_equipamento" class="form-control" required>
                                <option value="MC9090">MC9090</option>
                                <option value="MC3290">MC3290</option>
                                <option value="ZEBRA">ZEBRA</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Propriedade*</label>
                            <select id="propriedade" class="form-control">
                                <option value="Próprio">Próprio</option>
                                <option value="Alugado">Alugado</option>
                                <option value="Emprestado">Emprestado</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Condição*</label>
                            <select id="condicao" class="form-control">
                                <option value="Operando">Operando</option>
                                <option value="Quebrado">Quebrado</option>
                                <option value="Parado">Parado</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-primary" id="btnSalvar">Salvar Equipamento</button>
                        <button type="button" id="btnExcluir" class="btn-excluir" style="display:none;" onclick="excluirEquipamento()">Excluir Equipamento</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        let listaEquipamentos = [];
        // Se o erro 404 persistir, tente mudar essa linha para const API_BASE = '';
        const API_BASE = '/api'; 

        async function carregarDados() {
            try {
                const res = await fetch(`${API_BASE}/equipamentos`);
                if (!res.ok) throw new Error('Falha ao carregar');
                listaEquipamentos = await res.json();
                exibirDados(listaEquipamentos);
            } catch (err) { console.error("Erro ao carregar:", err); }
        }

        function exibirDados(dados) {
            const tabela = document.getElementById('dataTable1');
            tabela.innerHTML = dados.map(item => `
                <tr>    
                    <td>${item.identificador}</td>
                    <td><span class="status ${item.condicao ? item.condicao.toLowerCase() : ''}">${item.condicao}</span></td>
                    <td>${item.tipo_equipamento || '-'}</td>
                    <td><span class="propriedade-badge">${item.propriedade}</span></td>
                    <td>
                        <button onclick="abrirModalEdicao('${item.id}')" style="padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ddd;">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function abrirModalCadastro() {
            document.getElementById('modalTitulo').innerText = "Cadastrar Equipamento";
            document.getElementById('formCadastro').reset();
            document.getElementById('editId').value = "";
            document.getElementById('btnExcluir').style.display = "none";
            document.getElementById('modalCadastro').style.display = "flex";
        }

        function abrirModalEdicao(id) {
            const item = listaEquipamentos.find(e => e.id == id);
            if (!item) return;

            document.getElementById('modalTitulo').innerText = "Editar Equipamento";
            document.getElementById('editId').value = item.id;
            document.getElementById('identificador').value = item.identificador;
            document.getElementById('tipo_equipamento').value = item.tipo_equipamento;
            document.getElementById('propriedade').value = item.propriedade;
            document.getElementById('condicao').value = item.condicao;
            
            document.getElementById('btnExcluir').style.display = "block";
            document.getElementById('modalCadastro').style.display = "flex";
        }

        function fecharModalCadastro() {
            document.getElementById('modalCadastro').style.display = "none";
        }

        // SALVAR (CADASTRO E EDIÇÃO)
        document.getElementById('formCadastro').addEventListener('submit', async function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            
            const dados = {
                identificador: document.getElementById('identificador').value,
                tipo_equipamento: document.getElementById('tipo_equipamento').value,
                propriedade: document.getElementById('propriedade').value,
                condicao: document.getElementById('condicao').value,
                // Mantém compatibilidade com campos antigos do banco se necessário
                idPulsus: "", patrimonio: "", numero: "" 
            };

            // Se tem editId, usa a rota de equipamentos/ID, senão usa cadastrarEquipamento
            const url = editId ? `${API_BASE}/equipamentos/${editId}` : `${API_BASE}/cadastrarEquipamento`;
            const method = editId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    fecharModalCadastro();
                    carregarDados();
                } else {
                    const msg = await res.text();
                    alert("Erro no servidor: " + msg);
                }
            } catch (err) { console.error('Erro ao salvar:', err); }
        });

        // EXCLUIR
        async function excluirEquipamento() {
            const id = document.getElementById('editId').value;
            if (!id || !confirm("Tem certeza que deseja excluir?")) return;

            try {
                const res = await fetch(`${API_BASE}/equipamentos/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fecharModalCadastro();
                    carregarDados();
                } else {
                    alert("Erro ao excluir. Verifique a rota no servidor.");
                }
            } catch (err) { console.error('Erro ao excluir:', err); }
        }

        function filtrarTabela() {
            const busca = document.getElementById('inputBusca').value.toUpperCase();
            const filtrados = listaEquipamentos.filter(i => 
                i.identificador.toUpperCase().includes(busca)
            );
            exibirDados(filtrados);
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
