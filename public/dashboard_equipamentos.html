<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GPA - Dashboard Coletores</title>
    <link rel="stylesheet" href="css/user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        :root {
            --primary-bg: #02253B;
            --main-bg: #F4F7F9;
            --card-bg: #EAEAEA;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); margin: 0; display: flex; }

        .dashboard-container { 
            padding: 25px; 
            display: flex; 
            flex-direction: row; 
            justify-content: center; 
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .secao-equipamento { 
            flex: 1; 
            background: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .secao-equipamento h3 { 
            font-size: 18px;
            text-transform: uppercase; 
            margin-bottom: 25px; 
            color: var(--primary-bg);
            border-bottom: 3px solid var(--main-bg);
            padding-bottom: 12px;
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            margin-bottom: 25px;
        }

        .stat-label { 
            font-size: 11px; 
            font-weight: bold; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 6px;
            display: block;
        }

        .stat-value { 
            background: var(--card-bg); 
            height: 55px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 20px;
            color: #02253B;
        }

        .total-geral {
            margin-top: 15px;
            padding-top: 20px;
            border-top: 1px dashed #bbb;
        }

        .total-geral .stat-value { 
            width: 100%; height: 65px; 
            background: var(--primary-bg); color: white;
            font-size: 28px;
        }
    </style>
</head>
<body>

    <aside class="menu-lateral">
        <div class="menu-header">
            <img src="img/GPA.png" alt="Logo GPA" class="logo-menu">
            <button class="minimizar-menu"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="menu-items">
            <a href="index.html" class="menu-item"><i class="fas fa-home menu-icon"></i><span class="menu-text">Início</span></a>
            <a href="dashboard.html" class="menu-item"><i class="fas fa-history menu-icon"></i><span class="menu-text">Histórico</span></a>
            <a href="Usuario.html" class="menu-item"><i class="fas fa-users menu-icon"></i><span class="menu-text">Usuários</span></a>
            <a href="coletores.html" class="menu-item"><i class="fas fa-barcode menu-icon"></i><span class="menu-text">Coletores</span></a>
            <a href="dashboard_equipamentos.html" class="menu-item" style="background-color: #fff; color: #02253B;">
                <i class="fas fa-chart-bar menu-icon"></i><span class="menu-text">Dashboard</span>
            </a>
            <h4 style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 12px;">Dev: Henrique Dias</h4>
        </nav>
    </aside>

    <main class="conteudo-principal">
        <header class="conteudo-header">
            <h1 class="header-title">Controle de Coletores</h1>
        </header>

        <div class="dashboard-container">
            <div class="secao-equipamento">
                <h3>Coletor MC3290</h3>
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-label">Operando/Próprio</span><div class="stat-value" id="mc32-op-pr">0</div></div>
                    <div class="stat-box"><span class="stat-label">Quebrado</span><div class="stat-value" id="mc32-qb">0</div></div>
                    <div class="stat-box"><span class="stat-label">Alugados</span><div class="stat-value" id="mc32-al">0</div></div>
                    <div class="stat-box"><span class="stat-label">Emprestado</span><div class="stat-value" id="mc32-em">0</div></div>
                </div>
                <div class="total-geral"><span class="stat-label">Total Geral</span><div class="stat-value" id="mc32-total">0</div></div>
            </div>

            <div class="secao-equipamento">
                <h3>Coletor MC9090</h3>
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-label">Operando/Próprio</span><div class="stat-value" id="mc90-op-pr">0</div></div>
                    <div class="stat-box"><span class="stat-label">Quebrado</span><div class="stat-value" id="mc90-qb">0</div></div>
                    <div class="stat-box"><span class="stat-label">Alugados</span><div class="stat-value" id="mc90-al">0</div></div>
                    <div class="stat-box"><span class="stat-label">Emprestado</span><div class="stat-value" id="mc90-em">0</div></div>
                </div>
                <div class="total-geral"><span class="stat-label">Total Geral</span><div class="stat-value" id="mc90-total">0</div></div>
            </div>
        </div>
    </main>

    <script>
        async function carregarDashboard() {
            try {
                const response = await fetch('/api/equipamentos');
                if (!response.ok) throw new Error('Erro ao buscar dados');
                
                const dados = await response.json();

                const resumo = {
                    mc32: { opPr: 0, qb: 0, al: 0, em: 0, total: 0 },
                    mc90: { opPr: 0, qb: 0, al: 0, em: 0, total: 0 }
                };

                dados.forEach(item => {
                    const tipo = (item.tipo_equipamento || "").toUpperCase();
                    const cond = (item.condicao || "").toLowerCase();
                    const prop = (item.propriedade || "").toLowerCase();

                    let cat = null;
                    if (tipo.includes("3290")) cat = "mc32";
                    else if (tipo.includes("9090")) cat = "mc90";

                    if (cat) {
                        resumo[cat].total++;
                        if (cond.includes("operando") && (prop.includes("proprio") || prop.includes("próprio"))) {
                            resumo[cat].opPr++;
                        }
                        if (cond.includes("quebrado")) resumo[cat].qb++;
                        if (prop.includes("alugado")) resumo[cat].al++;
                        if (prop.includes("emprestado")) resumo[cat].em++;
                    }
                });

                const atualizarDOM = (prefix, obj) => {
                    document.getElementById(`${prefix}-op-pr`).innerText = obj.opPr;
                    document.getElementById(`${prefix}-qb`).innerText = obj.qb;
                    document.getElementById(`${prefix}-al`).innerText = obj.al;
                    document.getElementById(`${prefix}-em`).innerText = obj.em;
                    document.getElementById(`${prefix}-total`).innerText = obj.total;
                };

                atualizarDOM('mc32', resumo.mc32);
                atualizarDOM('mc90', resumo.mc90);

            } catch (e) {
                console.error("Erro no Dashboard:", e);
            }
        }

        window.onload = carregarDashboard;
        setInterval(carregarDashboard, 30000); // Auto-refresh 30s
    </script>
</body>
</html>
